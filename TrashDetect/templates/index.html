<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TACO · Trash Detector</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { accent: '#b5f23d' },
          fontFamily: { mono: ['Space Mono', 'monospace'] },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    body { background: #0d0f11; }
    .drop-active { border-color: #b5f23d !important; background: rgba(181,242,61,.06); }
    .spinner { border-top-color: #b5f23d; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .badge-score { background: rgba(181,242,61,.15); color: #b5f23d; }
  </style>
</head>
<body class="text-gray-200 font-mono min-h-screen">

  <!-- Header -->
  <header class="border-b border-white/10 px-6 py-4 flex items-center gap-3">
    <span class="w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#b5f23d] animate-pulse"></span>
    <h1 class="text-accent font-bold tracking-widest text-sm uppercase">TACO · Trash Detector</h1>
    <span class="ml-auto text-xs text-gray-600">Faster R-CNN</span>
  </header>

  <!-- Main grid -->
  <main class="max-w-5xl mx-auto px-4 py-10 grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- LEFT: Upload -->
    <div class="bg-white/5 border border-white/10 rounded-xl overflow-hidden flex flex-col">
      <div class="px-5 py-3 border-b border-white/10 text-xs text-gray-500 tracking-widest uppercase">
        Input
      </div>
      <div class="p-5 flex flex-col gap-4 flex-1">

        <!-- Drop zone -->
        <div id="drop-zone"
             class="border-2 border-dashed border-white/20 rounded-lg p-12 text-center cursor-pointer
                    transition-all duration-200 hover:border-accent/50 hover:bg-accent/5"
             onclick="document.getElementById('file-input').click()"
             ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <input id="file-input" type="file" accept="image/*" class="hidden" onchange="onFileChange(event)"/>
          <div class="text-4xl mb-3">🗂️</div>
          <p class="font-bold text-sm">Kéo thả hoặc click để chọn ảnh</p>
          <p class="text-xs text-gray-600 mt-1">JPG · PNG · WEBP</p>
        </div>

        <!-- Preview -->
        <div id="preview-wrap" class="hidden relative">
          <img id="preview-img" class="w-full rounded-lg object-contain max-h-72" src="" alt="preview"/>
          <button onclick="resetAll()"
                  class="absolute top-2 right-2 bg-black/60 border border-white/20 text-gray-400
                         hover:text-red-400 hover:border-red-400 rounded-full w-7 h-7 text-sm
                         flex items-center justify-center transition-colors">✕</button>
        </div>

        <!-- Run button -->
        <button id="run-btn" onclick="runDetection()"
                class="hidden w-full py-3 bg-accent text-black font-bold text-sm tracking-widest
                       uppercase rounded-lg hover:opacity-90 active:scale-95 transition-all
                       disabled:opacity-40 disabled:cursor-not-allowed">
          🔍 Detect
        </button>
      </div>
    </div>

    <!-- RIGHT: Result -->
    <div class="bg-white/5 border border-white/10 rounded-xl overflow-hidden flex flex-col">
      <div class="px-5 py-3 border-b border-white/10 flex items-center justify-between">
        <span class="text-xs text-gray-500 tracking-widest uppercase">Result</span>
        <span id="total-badge" class="hidden text-xs badge-score px-2 py-0.5 rounded-full font-bold"></span>
      </div>
      <div class="p-5 flex flex-col gap-4 flex-1">

        <!-- Empty state -->
        <div id="empty-state" class="flex flex-col items-center justify-center flex-1 gap-2 text-gray-700 text-xs">
          <span class="text-4xl opacity-30">🤖</span>
          <span>Chưa có kết quả</span>
        </div>

        <!-- Loader -->
        <div id="loader" class="hidden flex-col items-center justify-center flex-1 gap-3">
          <div class="spinner w-10 h-10 rounded-full border-4 border-white/10"></div>
          <span class="text-xs text-gray-500">Đang phân tích...</span>
        </div>

        <!-- Result image -->
        <div id="result-wrap" class="hidden flex flex-col gap-4">
          <img id="result-img" class="w-full rounded-lg object-contain max-h-72" src="" alt="result"/>

          <!-- Detection list -->
          <div>
            <p class="text-xs text-gray-500 uppercase tracking-widest mb-2">Detections</p>
            <ul id="det-list" class="space-y-1.5 max-h-48 overflow-y-auto pr-1"></ul>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script>
    let selectedFile = null;

    const COLORS = [
      '#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF',
      '#F4A261','#2EC4B6','#E76F51','#A8DADC','#F72585',
    ];
    const classColor = {};
    let colorIdx = 0;
    function getColor(cls) {
      if (!classColor[cls]) classColor[cls] = COLORS[colorIdx++ % COLORS.length];
      return classColor[cls];
    }

    // ── Drag & drop ──
    function onDragOver(e)  { e.preventDefault(); document.getElementById('drop-zone').classList.add('drop-active'); }
    function onDragLeave()  { document.getElementById('drop-zone').classList.remove('drop-active'); }
    function onDrop(e)      { e.preventDefault(); onDragLeave(); handleFile(e.dataTransfer.files[0]); }
    function onFileChange(e){ handleFile(e.target.files[0]); }

    function handleFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      selectedFile = file;

      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('preview-img').src = ev.target.result;
        document.getElementById('drop-zone').classList.add('hidden');
        document.getElementById('preview-wrap').classList.remove('hidden');
        document.getElementById('run-btn').classList.remove('hidden');
      };
      reader.readAsDataURL(file);
      resetResult();
    }

    function resetAll() {
      selectedFile = null;
      document.getElementById('file-input').value = '';
      document.getElementById('preview-wrap').classList.add('hidden');
      document.getElementById('drop-zone').classList.remove('hidden');
      document.getElementById('run-btn').classList.add('hidden');
      resetResult();
    }

    function resetResult() {
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('result-wrap').classList.add('hidden');
      document.getElementById('total-badge').classList.add('hidden');
    }

    // ── Run detection ──
    async function runDetection() {
      if (!selectedFile) return;

      const btn = document.getElementById('run-btn');
      btn.disabled = true;
      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('result-wrap').classList.add('hidden');
      document.getElementById('loader').classList.remove('hidden');
      document.getElementById('loader').classList.add('flex');

      const form = new FormData();
      form.append('image', selectedFile);

      try {
        const res  = await fetch('/predict', { method: 'POST', body: form });
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        // Show result image
        document.getElementById('result-img').src = 'data:image/jpeg;base64,' + data.image;

        // Total badge
        const badge = document.getElementById('total-badge');
        badge.textContent = `${data.detections.length} object${data.detections.length !== 1 ? 's' : ''}`;
        badge.classList.remove('hidden');

        // Detection list
        const list = document.getElementById('det-list');
        list.innerHTML = '';
        if (data.detections.length === 0) {
          list.innerHTML = '<li class="text-xs text-gray-600">Không tìm thấy object nào.</li>';
        } else {
          data.detections.forEach(d => {
            const color = getColor(d.class);
            const pct   = Math.round(d.score * 100);
            list.innerHTML += `
              <li class="flex items-center gap-2 text-xs">
                <span class="w-2 h-2 rounded-full flex-shrink-0" style="background:${color}"></span>
                <span class="flex-1 text-gray-300 truncate">${d.class}</span>
                <div class="w-24 bg-white/10 rounded-full h-1.5 flex-shrink-0">
                  <div class="h-1.5 rounded-full" style="width:${pct}%;background:${color}"></div>
                </div>
                <span class="text-gray-500 w-8 text-right">${pct}%</span>
              </li>`;
          });
        }

        document.getElementById('loader').classList.add('hidden');
        document.getElementById('loader').classList.remove('flex');
        document.getElementById('result-wrap').classList.remove('hidden');
        document.getElementById('result-wrap').classList.add('flex');

      } catch (err) {
        alert('Lỗi: ' + err.message);
        resetResult();
        document.getElementById('empty-state').classList.remove('hidden');
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
